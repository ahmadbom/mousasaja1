<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mousa & Saja</title>
<link rel="stylesheet" href="style.css">
</head>
<body class="page-landing">

  <div class="landing-bg"></div>
  <div class="pattern-overlay"></div>
  <canvas id="particles-canvas"></canvas>

  <!-- Corner ornaments -->
  <div class="corner-ornament corner-tl">
    <svg viewBox="0 0 160 160" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M0 0 C 60 5, 90 30, 95 90 C 98 40, 40 -2, 0 0Z" fill="currentColor" opacity="0.15" style="color:#cda34d"/>
      <path d="M2 2 Q 70 2 100 60 M2 2 Q 2 70 55 100" stroke="#cda34d" stroke-width="1.2" fill="none"/>
      <circle cx="2" cy="2" r="4" fill="#cda34d"/>
      <circle cx="100" cy="60" r="2.5" fill="#cda34d"/>
      <circle cx="55" cy="100" r="2.5" fill="#cda34d"/>
    </svg>
  </div>
  <div class="corner-ornament corner-tr">
    <svg viewBox="0 0 160 160" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M2 2 Q 70 2 100 60 M2 2 Q 2 70 55 100" stroke="#cda34d" stroke-width="1.2" fill="none"/>
      <circle cx="2" cy="2" r="4" fill="#cda34d"/>
      <circle cx="100" cy="60" r="2.5" fill="#cda34d"/>
      <circle cx="55" cy="100" r="2.5" fill="#cda34d"/>
    </svg>
  </div>
  <div class="corner-ornament corner-bl">
    <svg viewBox="0 0 160 160" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M2 2 Q 70 2 100 60 M2 2 Q 2 70 55 100" stroke="#cda34d" stroke-width="1.2" fill="none"/>
      <circle cx="2" cy="2" r="4" fill="#cda34d"/>
      <circle cx="100" cy="60" r="2.5" fill="#cda34d"/>
      <circle cx="55" cy="100" r="2.5" fill="#cda34d"/>
    </svg>
  </div>
  <div class="corner-ornament corner-br">
    <svg viewBox="0 0 160 160" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M2 2 Q 70 2 100 60 M2 2 Q 2 70 55 100" stroke="#cda34d" stroke-width="1.2" fill="none"/>
      <circle cx="2" cy="2" r="4" fill="#cda34d"/>
      <circle cx="100" cy="60" r="2.5" fill="#cda34d"/>
      <circle cx="55" cy="100" r="2.5" fill="#cda34d"/>
    </svg>
  </div>

  <main class="landing">
    <div class="landing-content">
      <div class="eyebrow">بسم الله الرحمن الرحيم</div>
<h1>
      <div class="landing-label">أنت مدعو بمحبة لحضور حفل زفاف</div>
</h1>

      <h1 class="landing-names">
        موسى
        <span class="amp">و</span>
        سجى
      </h1>

      <div class="divider"><span class="diamond"></span></div>

      <p class="landing-sub">19/07/2026 , الاحد &middot;</p>

      <button class="btn-open" id="openBtn">نسعد بحضوركم... اضغط لبدء الدعوة</button>
    </div>
  </main>

  <div class="transition-veil" id="veil"></div>

  <script src="script.js"></script>
</body>
</html>
